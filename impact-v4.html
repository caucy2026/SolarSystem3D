<!DOCTYPE html><html><head><meta charset="utf-8"><title>Jupiter Impact V4 — Dramatic Scale</title>
<style>*{margin:0;padding:0;overflow:hidden}body{background:#000}canvas{display:block}
#info{position:fixed;top:8px;left:8px;color:#999;font-size:11px;pointer-events:none;z-index:99;background:rgba(0,0,0,0.5);padding:3px 7px;border-radius:3px}
#btns{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100}
button{padding:10px 20px;margin:0 4px;font-size:14px;border:1px solid #555;background:#111;color:#aaa;border-radius:5px;cursor:pointer}
button:hover{background:#333}button.go{background:#631;border-color:#c52;font-size:16px;padding:12px 26px;color:#fc8}</style></head>
<body>
<div id="info">Jupiter Impact V4 | Drag:rotate Scroll:zoom</div>
<div id="btns"><button class="go" onclick="impact()">💥 IMPACT</button><button onclick="impactLarge()">Large</button></div>
<script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
<script>
// ═══════════════ V4 — Everything BIGGER, BRIGHTER, LOUDER ═══════════════
var JR=2.0, S,C,R,FL,JP;
var fireballs=[], gWaves=[], craters=[], impactN=0;
var pGeo,pPos,pVel,pLife,pSize,pColor,pMat,nextP=0,MAX_P=8000;
var clock,autoT=5,dragging=false,px=0,py=0,sph;

// Scene
S=new THREE.Scene();S.background=new THREE.Color(0x000010);
C=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,200);
C.position.set(2.5,1.5,6);C.lookAt(0,0,0);
R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio,2));document.body.appendChild(R.domElement);
S.add(new THREE.AmbientLight(0x223344,0.4));
var sunL=new THREE.DirectionalLight(0xffeedd,1.8);sunL.position.set(8,5,6);S.add(sunL);
FL=new THREE.PointLight(0xff8844,0,80,1.5);FL.position.set(0,2,0);S.add(FL);

// Stars
var sv=[];for(var i=0;i<2000;i++)sv.push((Math.random()-0.5)*80,(Math.random()-0.5)*50,(Math.random()-0.5)*40);
var sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
S.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x666688,size:0.06,sizeAttenuation:true})));

// Jupiter
var jc=document.createElement('canvas');jc.width=1024;jc.height=512;var jx=jc.getContext('2d');
for(var y=0;y<512;y++){var t=y/512;jx.fillStyle='rgb('+(180+Math.sin(t*20)*30+Math.sin(t*8)*15|0)+','+(150+Math.sin(t*15)*20|0)+','+(100+Math.sin(t*10)*15|0)+')';jx.fillRect(0,y,1024,1);}
for(var b=0;b<30;b++){var by=30+Math.random()*452,bh=4+Math.random()*28;jx.fillStyle='rgba('+(170+Math.random()*60|0)+','+(120+Math.random()*45|0)+','+(70+Math.random()*35|0)+','+(0.04+Math.random()*0.16)+')';jx.fillRect(0,by,1024,bh);}
var grs=jx.createRadialGradient(480,270,0,480,270,38);grs.addColorStop(0,'rgba(210,110,55,0.55)');grs.addColorStop(0.4,'rgba(185,85,45,0.35)');grs.addColorStop(1,'rgba(0,0,0,0)');jx.fillStyle=grs;jx.fillRect(440,230,80,80);
var jTex=new THREE.CanvasTexture(jc);jTex.colorSpace=THREE.SRGBColorSpace;
JP=new THREE.Mesh(new THREE.SphereGeometry(JR,64,48),new THREE.MeshStandardMaterial({map:jTex,roughness:0.65}));S.add(JP);

// Camera
sph=new THREE.Spherical(6.5,Math.PI*0.35,0);C.position.setFromSpherical(sph);C.lookAt(0,0,0);
R.domElement.addEventListener('pointerdown',function(e){dragging=true;px=e.clientX;py=e.clientY;});
R.domElement.addEventListener('pointermove',function(e){if(!dragging)return;sph.theta-=(e.clientX-px)*0.005;sph.phi-=(e.clientY-py)*0.005;sph.phi=Math.max(0.08,Math.min(Math.PI-0.08,sph.phi));C.position.setFromSpherical(sph);C.lookAt(0,0,0);px=e.clientX;py=e.clientY;});
window.addEventListener('pointerup',function(){dragging=false;});
R.domElement.addEventListener('wheel',function(e){e.preventDefault();sph.radius+=e.deltaY*0.01;sph.radius=Math.max(2.5,Math.min(30,sph.radius));C.position.setFromSpherical(sph);C.lookAt(0,0,0);},{passive:false});

// GPU Particles (8000 pool)
pGeo=new THREE.BufferGeometry();pPos=new Float32Array(MAX_P*3);pVel=new Float32Array(MAX_P*3);pLife=new Float32Array(MAX_P);pSize=new Float32Array(MAX_P);pColor=new Float32Array(MAX_P*3);
for(var i=0;i<MAX_P;i++){pLife[i]=-1;pSize[i]=0.04;}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));pGeo.setAttribute('aSize',new THREE.BufferAttribute(pSize,1));pGeo.setAttribute('aColor',new THREE.BufferAttribute(pColor,3));
var pVert='attribute float aSize;attribute vec3 aColor;varying vec3 vCol;void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);gl_Position=projectionMatrix*mv;gl_PointSize=aSize*500.0/-mv.z;vCol=aColor;}';
var pFrag='varying vec3 vCol;void main(){float d=length(gl_PointCoord-0.5)*2.0;float a=exp(-d*d*3.0);gl_FragColor=vec4(vCol,a);}';
pMat=new THREE.ShaderMaterial({vertexShader:pVert,fragmentShader:pFrag,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
var PT=new THREE.Points(pGeo,pMat);PT.frustumCulled=false;PT.renderOrder=990;S.add(PT);

// Noise GLSL
var NGL='float hash(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453);}float noise(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}float fbm(vec3 p){float v=0.0,a=0.5;vec3 s=vec3(1.0);for(int i=0;i<5;i++){v+=a*noise(p*s);a*=0.5;s*=2.0;}return v;}';

// ════════════ FIREBALL — 30-50% of Jupiter size ════════════
function mkFireball(pos,power){
  var g=new THREE.Group();g.position.copy(pos);var fS=0.6*power;
  var fGeo=new THREE.SphereGeometry(fS,40,30);
  var fV=NGL+'varying vec3 vP;varying float vN;uniform float uT;uniform float uS;void main(){vec3 p=position;float n1=fbm(p*2.0+uT*1.5)*0.5;float n2=fbm(p*4.0-uT*0.7)*0.3;float n3=noise(p*8.0+uT*2.0)*0.15;p+=normal*(n1+n2+n3)*uS;gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);vP=p;vN=n1+n2+n3;}';
  var fF=NGL+'varying vec3 vP;varying float vN;uniform float uT;uniform float uA;uniform float uS;void main(){float d=length(vP)/uS;float n=fbm(vP*3.0+uT*0.5)*0.4;float core=exp(-d*d*8.0);float mid=exp(-d*d*2.2)*(1.0-core)*0.6;float outer=exp(-d*d*0.7)*(1.0-mid-core)*0.25;float a=(core*1.0+mid*0.65+outer*0.3)*uA;a+=n*0.3*uA*(1.0-d);vec3 col=vec3(1.0,0.95,0.8)*core+vec3(1.0,0.45,0.05)*mid+vec3(0.5,0.04,0.01)*outer;col+=n*vec3(0.3,0.12,0.0);gl_FragColor=vec4(col,a);}';
  var fU={uT:{value:0},uA:{value:1},uS:{value:fS}};
  var fM=new THREE.ShaderMaterial({vertexShader:fV,fragmentShader:fF,uniforms:fU,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
  var core=new THREE.Mesh(fGeo,fM);core.renderOrder=999;g.add(core);
  var glGeo=new THREE.SphereGeometry(fS*2.5,24,18);
  var glM=new THREE.ShaderMaterial({vertexShader:'varying vec3 vP;void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);gl_Position=projectionMatrix*mv;vP=position;}',fragmentShader:'varying vec3 vP;uniform float uA;uniform float uS;void main(){float d=length(vP)/uS;float a=exp(-d*d*0.3)*0.4*uA;gl_FragColor=vec4(vec3(1.0,0.25,0.03),a);}',uniforms:{uA:{value:1},uS:{value:fS*2.5}},blending:THREE.AdditiveBlending,depthWrite:false,transparent:true});
  var glow=new THREE.Mesh(glGeo,glM);glow.renderOrder=998;g.add(glow);
  S.add(g);fireballs.push({g:g,core:core,glow:glow,fU:fU,gU:glM.uniforms,size:fS,age:0,life:5*power,pow:power});
}

// ════════════ IMPACT CRATER — dark scar, BIG ════════════
function mkCrater(pos,jupC,power){
  var R=JR,cd=0.6*power,segs=32,verts=[],idxs=[];
  for(var ri=0;ri<=segs;ri++)for(var ai=0;ai<=segs*2;ai++){
    var r=(ri/segs)*cd*0.7,a=(ai/(segs*2))*Math.PI*2,px=Math.cos(a)*r,pz=Math.sin(a)*r,d=r/(cd*0.7),h=0;
    if(d<0.25)h=-cd*0.2*(1-d/0.25);
    else if(d<0.55)h=-cd*0.2*(1-d/0.25)*(1-(d-0.25)/0.3);
    else if(d<1.0)h=cd*0.04*(d-0.55)/0.45;
    var sx=px,sy=R+h,sz=pz,sl=Math.sqrt(sx*sx+sy*sy+sz*sz);verts.push(sx/sl*R,sy/sl*R,sz/sl*R);
  }
  for(var ri=0;ri<segs;ri++)for(var ai=0;ai<segs*2;ai++){var a=ri*(segs*2+1)+ai,b=a+1,c=a+(segs*2+1),d=c+1;idxs.push(a,b,d,a,d,c);}
  var geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));geo.setIndex(idxs);geo.computeVertexNormals();
  var mat=new THREE.MeshStandardMaterial({color:0x0a0300,roughness:1,metalness:0,emissive:0x010000,emissiveIntensity:0.4,transparent:true,opacity:0,depthWrite:true});
  var patch=new THREE.Mesh(geo,mat);patch.position.copy(pos);patch.lookAt(jupC);patch.renderOrder=0;S.add(patch);
  craters.push({patch:patch,age:0,targetOpacity:0.9*power});
}

// ════════════ GRAVITATIONAL WAVES — expanding rings into space ════════════
function mkGravWave(pos,jupC,power){
  var rings=[];
  var gV='varying vec3 vP;void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);gl_Position=projectionMatrix*mv;vP=position;}';
  var gF='varying vec3 vP;uniform float uT;uniform float uA;uniform float uW;void main(){float d=abs(length(vP.xy)/uW-0.5)*2.0;float ring=exp(-d*d*12.0);float rip=sin(length(vP.xy)*15.0-uT*3.0)*0.5+sin(length(vP.xy)*8.0+uT*1.5)*0.3;float a=ring*(0.4+rip*0.3)*uA;vec3 col=mix(vec3(0.2,0.4,0.8),vec3(0.6,0.75,1.0),ring+rip*0.5);gl_FragColor=vec4(col,a);}';
  for(var ri=0;ri<4;ri++){
    var r0=0.3+ri*0.25;
    var geo=new THREE.TorusGeometry(r0,0.04-(ri*0.006),20,60);
    var mat=new THREE.ShaderMaterial({vertexShader:gV,fragmentShader:gF,uniforms:{uT:{value:0},uA:{value:0.8-ri*0.15},uW:{value:r0}},transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
    var ring=new THREE.Mesh(geo,mat);ring.position.copy(pos);ring.lookAt(pos.clone().add(new THREE.Vector3(0,1,0)));
    ring.renderOrder=996-ri;ring.userData={wi:ri,delay:ri*0.55,mr:mat,br:r0};S.add(ring);rings.push(ring);
  }
  gWaves.push({rings:rings,age:0,life:6*power,pow:power});
}

// ════════════ EJECTA ════════════
function mkEjecta(origin,dir,count,power){
  var tan=new THREE.Vector3(-dir.z,0,dir.x).normalize();
  var bit=new THREE.Vector3().crossVectors(dir,tan);
  for(var i=0;i<count;i++){
    var idx=nextP;nextP=(nextP+1)%MAX_P;
    var elev=Math.random()*Math.PI*0.5,az=Math.random()*Math.PI*2;
    var sp=power*(0.5+Math.random()*3.0);
    var v=dir.clone().multiplyScalar(Math.sin(elev)*sp).add(tan.clone().multiplyScalar(Math.cos(az)*Math.cos(elev)*sp)).add(bit.clone().multiplyScalar(Math.sin(az)*Math.cos(elev)*sp));
    pPos[idx*3]=origin.x;pPos[idx*3+1]=origin.y;pPos[idx*3+2]=origin.z;
    pVel[idx*3]=v.x;pVel[idx*3+1]=v.y;pVel[idx*3+2]=v.z;
    pLife[idx]=2+Math.random()*8*power;pSize[idx]=0.04+Math.random()*0.12*power;
    var tp=Math.random();pColor[idx*3]=1.0;pColor[idx*3+1]=0.45+tp*0.35;pColor[idx*3+2]=0.04+tp*0.08;
  }
  pGeo.attributes.position.needsUpdate=true;pGeo.attributes.aSize.needsUpdate=true;pGeo.attributes.aColor.needsUpdate=true;
}

// ════════════ TRIGGER ════════════
function doImpact(x,y,z,power){
  var pos=new THREE.Vector3(x,y,z).normalize().multiplyScalar(JR*1.05);
  var dir=pos.clone().normalize();var jC=new THREE.Vector3(0,0,0);
  impactN++;console.log('IMPACT #'+impactN+' p='+power.toFixed(1));
  FL.position.copy(pos);FL.intensity=100*power;FL.color.set(0xffcc88);
  mkFireball(pos,power);
  mkCrater(pos,jC,power);
  mkEjecta(pos,dir,Math.floor(250*power),power);
}
function impact(){var ph=Math.acos(2*Math.random()-1),th=Math.random()*Math.PI*2;var x=JR*Math.sin(ph)*Math.cos(th),y=JR*Math.sin(ph)*Math.sin(th),z=JR*Math.cos(ph);if(z<-0.2){impact();return;}doImpact(x,y,z,1.0+Math.random()*0.5);}
function impactLarge(){doImpact(0,JR*0.5,JR*0.85,2.5);}
window.impact=impact;window.impactLarge=impactLarge;

// ════════════ UPDATE ════════════
function updParticles(dt){
  for(var i=0;i<MAX_P;i++){if(pLife[i]<=0)continue;pLife[i]-=dt;
    pPos[i*3]+=pVel[i*3]*dt;pPos[i*3+1]+=pVel[i*3+1]*dt;pPos[i*3+2]+=pVel[i*3+2]*dt;
    var dx=-pPos[i*3],dy=-pPos[i*3+1],dz=-pPos[i*3+2],dist=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.01;
    var gf=3.0*dt/(dist*dist*0.3+1.0);
    pVel[i*3]+=dx/dist*gf;pVel[i*3+1]+=dy/dist*gf;pVel[i*3+2]+=dz/dist*gf;
    pVel[i*3]*=0.997;pVel[i*3+1]*=0.997;pVel[i*3+2]*=0.997;
    var alpha=pLife[i]/10;pColor[i*3+1]=alpha*0.6;pColor[i*3+2]=alpha*0.1;
    if(pLife[i]<=0){pPos[i*3]=pPos[i*3+1]=pPos[i*3+2]=-999;}
  }pGeo.attributes.position.needsUpdate=true;pGeo.attributes.aColor.needsUpdate=true;
}

clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);var dt=Math.min(clock.getDelta(),0.1);
  autoT-=dt;if(autoT<=0){autoT=4+Math.random()*7;impact();}
  updParticles(dt);

  // Fireballs
  for(var fi=fireballs.length-1;fi>=0;fi--){var fb=fireballs[fi];fb.age+=dt;var p=Math.min(fb.age/fb.life,1.0);
    var sc=1+Math.pow(p,0.45)*8*fb.pow;fb.g.scale.setScalar(sc);
    fb.fU.uT.value=fb.age;fb.fU.uA.value=p<0.1?p*10:Math.max(0,1-(p-0.1)*(p-0.1)*1.3);
    fb.gU.uA.value=Math.max(0,(1-p*p)*0.5);fb.gU.uS.value=fb.size*2.5*sc;
    if(p>=1){S.remove(fb.g);fb.g.traverse(function(c){if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});fireballs.splice(fi,1);}
  }

  // Craters
  for(var ci=craters.length-1;ci>=0;ci--){var cr=craters[ci];cr.age+=dt;
    if(cr.age<1.0)cr.patch.material.opacity=Math.min(cr.targetOpacity,cr.age/1.0*cr.targetOpacity);
    else if(cr.age>120)cr.patch.material.opacity=Math.max(0.15,cr.targetOpacity-(cr.age-120)/120*cr.targetOpacity);
    if(cr.age>240){S.remove(cr.patch);cr.patch.geometry.dispose();cr.patch.material.dispose();craters.splice(ci,1);}
  }

  FL.intensity=Math.max(0,FL.intensity-dt*40);
  while(fireballs.length>6){var f=fireballs.shift();S.remove(f.g);}
  R.render(S,C);
}
animate();
window.addEventListener('resize',function(){C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});
</script></body></html>
