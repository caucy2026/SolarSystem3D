<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Asteroid Demo</title>
<style>body{margin:0;overflow:hidden;background:#000}
#info{position:fixed;top:8px;left:8px;color:#fff;font-size:12px;background:rgba(0,0,0,.8);padding:6px 10px;border-radius:4px}</style>
</head><body>
<div id="info"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var S=new THREE.Scene();S.background=new THREE.Color(0x000015);
var C=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,20);
C.position.set(1.5,1,3);C.lookAt(0,0,0);
var R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);
document.body.appendChild(R.domElement);
S.add(new THREE.AmbientLight(0x334455,0.35));
S.add(new THREE.PointLight(0xffffff,5,0,0));

// Current solar.html asteroid code
var cols=[0x998877,0x776655,0x887766,0xaa9977,0x665544,0x778899];

function makeRockGeo(size,seed){
  var geo=new THREE.SphereGeometry(size,16,8);
  var pos=geo.attributes.position;
  for(var i=0;i<pos.count;i++){
    var x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    var dist=Math.sqrt(x*x+y*y+z*z);if(dist<0.001)continue;
    var r=1.0+0.12*Math.sin(x*3.7+seed*1.3)*Math.cos(z*2.9+seed*3.7)*Math.sin(y*4.1+seed*5.3);
    pos.setXYZ(i,x*r,y*r,z*r);
  }
  geo.computeVertexNormals();return geo;
}

var meshes=[];
for(var ai=0;ai<6;ai++){
  var seed=ai*137.5+42,size=0.25+Math.random()*0.25;
  var geo=makeRockGeo(size,seed);
  var mat=new THREE.MeshLambertMaterial({color:cols[ai]});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.position.set((ai-2.5)*0.7,0,0);
  mesh.userData={rs:0.01};
  meshes.push(mesh);S.add(mesh);
}

// Add a reference sphere for comparison
var refGeo=new THREE.SphereGeometry(0.3,32,16);
var refMat=new THREE.MeshLambertMaterial({color:0xcccccc});
var refSphere=new THREE.Mesh(refGeo,refMat);
refSphere.position.set(0,-1.5,0);
S.add(refSphere);

var t=0;
function animate(){
  requestAnimationFrame(animate);
  meshes.forEach(function(m){m.rotation.y+=m.userData.rs;});
  refSphere.rotation.y+=0.005;
  R.render(S,C);
}
animate();

setTimeout(function(){
  var gl=R.getContext();
  document.getElementById('info').textContent='GPU: '+gl.getParameter(gl.RENDERER)+' | Top: procedural asteroids | Bottom: reference sphere';
},500);
</script>
</body></html>
